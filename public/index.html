<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Telegram Downloader Admin</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/config.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">后台管理</p>
          <h1>Telegram Downloader</h1>
        </div>
        <div class="top-actions">
          <label class="refresh-control" for="refreshInterval">
            <span>刷新间隔</span>
            <select id="refreshInterval">
              <option value="500">0.5s</option>
              <option value="1000">1s</option>
              <option value="2000">2s</option>
              <option value="3000">3s</option>
              <option value="5000">5s</option>
            </select>
          </label>
          <div class="status-pill" id="connectionStatus">连接中</div>
        </div>
      </header>

      <section class="metrics" aria-label="核心状态">
        <article class="metric">
          <span>下载中</span>
          <strong id="downloadingCount">0</strong>
        </article>
        <article class="metric">
          <span>待下载</span>
          <strong id="queuedCount">0</strong>
        </article>
        <article class="metric">
          <span>CPU</span>
          <strong id="cpuValue">0%</strong>
        </article>
        <article class="metric">
          <span>内存</span>
          <strong id="memoryValue">0%</strong>
        </article>
      </section>

      <section class="grid">
        <section class="panel downloads-panel">
          <div class="panel-head">
            <h2>下载队列</h2>
            <span id="lastUpdated">--</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>文件</th>
                  <th>状态</th>
                  <th>进度</th>
                  <th>速度</th>
                  <th>ETA</th>
                </tr>
              </thead>
              <tbody id="downloadRows">
                <tr><td colspan="5" class="empty">暂无下载任务</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <aside class="side">
          <section class="panel chart-panel">
            <div class="panel-head">
              <h2>资源曲线</h2>
              <span>最近采样</span>
            </div>
            <canvas id="resourceChart" width="640" height="280"></canvas>
            <div class="legend">
              <span><i class="cpu"></i>CPU</span>
              <span><i class="memory"></i>内存</span>
            </div>
          </section>

          <section class="panel component-panel">
            <div class="panel-head">
              <h2>组件</h2>
            </div>
            <dl class="components">
              <div>
                <dt>Downloader</dt>
                <dd id="downloaderOnline">--</dd>
              </div>
              <div>
                <dt>Bot API</dt>
                <dd id="botApiOnline">--</dd>
              </div>
              <div>
                <dt>Bot</dt>
                <dd id="botOnline">--</dd>
              </div>
              <div>
                <dt>授权用户</dt>
                <dd id="userInfo">--</dd>
              </div>
            </dl>
          </section>

          <section class="panel storage-panel">
            <div class="panel-head">
              <h2>存储</h2>
            </div>
            <div class="storage-row">
              <span>下载目录</span>
              <strong id="downloadDiskText">--</strong>
            </div>
            <div class="bar"><span id="downloadDiskBar"></span></div>
            <div class="storage-row">
              <span>Bot API 目录</span>
              <strong id="botApiDiskText">--</strong>
            </div>
            <div class="bar"><span id="botApiDiskBar"></span></div>
          </section>
        </aside>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
